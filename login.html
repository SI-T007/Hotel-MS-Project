<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Hotel Management System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="layout-auth">

  <div class="auth-header">
    <div class="app-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="7" width="20" height="15" rx="1"/>
        <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        <path d="M8 12h.01M16 12h.01M8 16h.01M16 16h.01M12 16h.01"/>
      </svg>
    </div>
    <div class="app-name">HMS Platform</div>
    <div class="app-tagline">Sign in to your workspace</div>
  </div>

  <div class="auth-card">
    <form onsubmit="handleLogin(event)">

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input id="email" type="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <input id="password" type="password" class="form-input has-toggle" placeholder="••••••••" autocomplete="current-password" required />
          <button type="button" class="pw-toggle" onclick="togglePassword()" title="Show/hide password">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-auth" id="submitBtn">Sign in</button>
    </form>
  </div>

  <div class="auth-footer">
    <p>Interested in HMS? <a href="#">Request access</a></p>
    <div class="lang-select-wrap">
      <select class="lang-select">
        <option value="en">English</option>
        <option value="ur">اردو</option>
      </select>
    </div>
  </div>

  <script>
    function togglePassword() {
      const inp  = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        inp.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }
    function handleLogin(e) {
      e.preventDefault();
      const btn = e.target.querySelector('.btn-auth');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
    }
  </script>
</body>
</html>
